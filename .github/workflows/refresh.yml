name: Refresh polední menu

on:
  schedule:
    # GitHub cron je v UTC. Praha = UTC+2 (léto) / UTC+1 (zima).
    # 08:00 UTC = 10:00 CEST (léto) / 09:00 CET (zima). Cíl: každý den v 10:00.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-menu
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stáhnout dnešní polední menu (menicka + choiceqr + volitelně LLM)
        env:
          # Volitelné: nastav v repo Settings → Secrets pro LLM extrakci z heterogenních webů.
          # Funguje bez nich (jen menicka + choiceqr); s klíčem se stahuje i dlouhý ocas.
          OBED_LLM_KEY: ${{ secrets.OBED_LLM_KEY }}
          OBED_LLM_URL: ${{ secrets.OBED_LLM_URL }}
          OBED_LLM_MODEL: ${{ secrets.OBED_LLM_MODEL }}
        run: python scripts/scrape.py

      - name: Commitnout aktualizovaná data
        run: |
          git config user.name "obed-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/restaurants.json data/places.json
          if git diff --staged --quiet; then
            echo "Žádná změna v datech."
          else
            git commit -m "data: refresh menu $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi
