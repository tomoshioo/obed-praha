<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Oběd na mapě – polední menu v Praze</title>
  <meta name="description" content="Mapa pražských restaurací s dnešním poledním menu. Najeď myší na restauraci ve svém okolí a hned vidíš, co dnes vaří." />
  <meta name="theme-color" content="#e11d48" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Oběd na mapě – polední menu v Praze" />
  <meta property="og:description" content="Najdi si oběd ve svém okolí. Pražská polední menu na jedné mapě, barevně podle ceny." />
  <meta property="og:locale" content="cs_CZ" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="logo">🍽️</span>
      <div class="titles">
        <h1>Oběd na mapě</h1>
        <p>polední menu v Praze · <span id="meta">načítám…</span></p>
      </div>
    </div>
    <div class="controls">
      <div class="searchbox" data-ico="🍽️">
        <input id="filter" type="search" placeholder="Filtr: jídlo nebo restaurace (např. svíčková)" autocomplete="off" />
      </div>
      <div class="searchbox" data-ico="📍">
        <input id="place" type="search" placeholder="Skoč na adresu / místo (např. Vinohrady)" autocomplete="off" />
      </div>
      <button id="locate" title="Najít mě na mapě"><span>📍</span> Moje poloha</button>
    </div>
  </header>

  <div id="map"></div>

  <div class="legend" id="legend">
    <b>Cena oběda</b>
    <div class="row"><span class="sw" style="background:#16a34a"></span> do 130 Kč</div>
    <div class="row"><span class="sw" style="background:#f59e0b"></span> 130–179 Kč</div>
    <div class="row"><span class="sw" style="background:#e11d48"></span> 180 Kč a víc</div>
    <div class="row" style="margin-top:6px;padding-top:6px;border-top:1px solid #eee"><span class="sw" style="background:#3b82f6"></span> menu jen odkazem</div>
    <div class="row"><span class="sw" style="background:#b8c0cc"></span> bez online menu</div>
    <div class="row"><span class="sw" style="background:#fff;box-shadow:inset 0 0 0 2.5px #10b981"></span> z webu restaurace</div>
  </div>

  <div id="hint" class="hint">Najeď myší na restauraci a uvidíš dnešní menu. Na mobilu klepni na špendlík.</div>

  <div id="loader" class="loader">
    <div class="plate">🍽️</div>
    <span>Načítám dnešní polední menu…</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="app.js?v=5"></script>
</body>
</html>
